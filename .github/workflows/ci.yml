name: "CI"
on:
  push:
    paths-ignore:
      - "sample/**"
      - "**.md"
      - "renovate.json"
      - "Jenkinsfile"
permissions:
  contents: read

jobs:
  check_generated_schema:
    runs-on: ubuntu-latest
    container:
      image: "node:24.18.0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - run: npm ci
      - name: Check generated schema diff
        run: |
          original_schema="$(mktemp)"
          cp schema.json "$original_schema"
          npm run json_schema
          diff -u "$original_schema" schema.json

  lint_fmt:
    runs-on: ubuntu-latest
    container:
      image: "node:24.18.0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - run: npm ci
      - name: Biome lint and format
        run: npm run biome:ci

  build_and_test:
    runs-on: ubuntu-latest
    container:
      image: "node:24.18.0"
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Setup
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - run: npm ci
      # Test
      - name: Type check
        run: npm run check
      - name: Test
        run: npm run test:ci

      # Post actions
      - name: Create custom json
        env:
          JOB: ${{ github.job }}
          OS: ${{ runner.os }}
        run: |
          echo "{ \"job\": \"${JOB}\", \"node\": \"ubuntu-latest\", \"os\": \"${OS}\", \"container\": \"node:lts\" }" > custom_report.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() }}
        with:
          name: test_results
          path: |
            junit/*.xml
            custom_report.json
      - uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1
        name: Upload coverage

  smoke_test:
    runs-on: ubuntu-latest
    container:
      image: "node:24.18.0"
    permissions:
      contents: read
    steps:
      # Setup
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - run: npm ci
      # Test
      - name: Smoke test Node TypeScript runtime
        run: |
          ./src/index.ts --version
          ./src/index.ts --help

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          tags: ghcr.io/kesin11/ci_analyzer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test container CLI command
        run: |
          docker run --rm --entrypoint sh ghcr.io/kesin11/ci_analyzer:latest -c '
            ci_analyzer --version &&
            ci_analyzer --help >/dev/null
          '
